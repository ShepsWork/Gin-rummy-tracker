name: Deploy to Oracle VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deployment Strategy:
# 1. Build multi-platform Docker image (amd64, arm64)
# 2. Push to GHCR (ghcr.io/shepswork/gin-rummy-tracker:latest)
# 3. Manual pull and restart on Oracle VM (or future webhook endpoint)
#
# Public API: https://gin-rummy.yancmo.xyz/api
# Frontend: https://shepswork.github.io/Gin-rummy-tracker/

permissions:
  contents: read
  packages: write

concurrency:
  group: gin-rummy-tracker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${GITHUB_REPOSITORY}"
          image_repo="$(echo "${image_repo}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:latest
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.short_sha }}

      - name: Image pushed to GHCR
        shell: bash
        run: |
          echo "✅ Docker image built and pushed to GHCR"
          echo "   Repository: ${{ steps.meta.outputs.image_repo }}"
          echo "   Tags: latest, ${{ steps.meta.outputs.short_sha }}"
          echo ""
          echo "📝 Manual deployment on Oracle VM:"
          echo "   ssh ubuntu@100.81.231.58"
          echo "   cd /opt/infra-new/apps/gin-rummy-tracker"
          echo "   docker pull ghcr.io/shepswork/gin-rummy-tracker:latest"
          echo "   docker tag ghcr.io/shepswork/gin-rummy-tracker:latest gin-rummy-tracker:latest"
          echo "   docker compose -f docker-compose.prod.yml up -d"
          echo ""
          echo "🌐 Public endpoint: https://gin-rummy.yancmo.xyz/api"
