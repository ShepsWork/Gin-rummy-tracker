name: Deploy to Oracle VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required repository secrets:
# - ORACLE_VM_SSH_KEY: private SSH key for the deploy user on the Oracle VM
# - ORACLE_VM_USER: SSH username on the Oracle VM (default: ubuntu)
#
# Note: Deploy target is hardcoded to Oracle VM public IP (100.81.231.58)
# since GitHub Actions runners can't access Tailscale or private networks.
#
# Traefik routing configured for: gin-rummy.yancmo.xyz

permissions:
  contents: read
  packages: write

concurrency:
  group: gin-rummy-tracker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${GITHUB_REPOSITORY}"
          image_repo="$(echo "${image_repo}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image_repo }}:latest
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.short_sha }}

      - name: Trigger deployment webhook on Oracle VM
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.short_sha }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          
          # The webhook is hosted locally on the VM at port 8888
          # We reach it via Cloudflare Tunnel's public endpoint
          # For now, using local IP since webhook is not yet exposed publicly
          
          PAYLOAD=$(cat <<EOF
          {
            "imageTag": "${IMAGE_TAG}",
            "pushedBy": "github-actions",
            "repo": "${{ github.repository }}",
            "ref": "${{ github.ref }}"
          }
          EOF
          )
          
          SIGNATURE=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -hex | sed 's/^.*= //')
          
          # Try to reach webhook locally first (if on same network)
          # Otherwise, fall back to manual deployment or use GitHub dispatch
          
          echo "📦 Image pushed to GHCR: ${{ steps.meta.outputs.image_repo }}:${IMAGE_TAG}"
          echo "✅ Waiting for VM to auto-pull via watchtower (monitor at gin-rummy.yancmo.xyz)"
          echo "   Note: Webhook deployment will be available after initial VM setup"
