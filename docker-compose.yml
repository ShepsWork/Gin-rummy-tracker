version: '3.8'

services:
  gin-rummy-server:
    build: .
    image: gin-rummy-tracker:latest
    container_name: gin-rummy-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - gin-rummy-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  gin-rummy-data:
    driver: local
